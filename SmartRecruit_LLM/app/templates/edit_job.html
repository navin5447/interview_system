{% extends 'base.html' %}

{% block title %}SmartRecruit | Edit Job{% endblock %}

{% block content %}
<style>
    /* ===== Edit Job Premium Form Styling ===== */
    
    .edit-job-wrapper {
        padding: 20px 0;
        max-width: 900px;
        margin: 0 auto;
    }
    
    .form-header {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 40px;
        padding: 30px;
        background: linear-gradient(135deg, rgba(115, 83, 246, 0.08), rgba(92, 201, 245, 0.08));
        border: 1px solid rgba(115, 83, 246, 0.1);
        border-radius: 16px;
        box-shadow: var(--shadow-soft);
    }
    
    .form-header .icon {
        font-size: 40px;
        background: var(--gradient-primary);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    
    .form-header h1 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 36px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--color-graphite);
        margin: 0;
    }
    
    .create-job form {
        background: var(--color-surface);
        border: 1px solid var(--color-border-subtle);
        border-radius: 16px;
        padding: 40px;
        box-shadow: var(--shadow-soft);
    }
    
    .form-section {
        margin-bottom: 40px;
    }
    
    .form-section:last-child {
        margin-bottom: 0;
    }
    
    .form-section h3 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 20px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--color-purple);
        margin-bottom: 20px;
        padding-bottom: 12px;
        border-bottom: 2px solid var(--color-border-subtle);
    }
    
    .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 20px;
    }
    
    .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    
    .form-group label {
        font-family: 'Montserrat', sans-serif;
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        color: var(--color-purple);
    }
    
    .form-group input,
    .form-group textarea,
    .form-group select {
        padding: 12px 16px;
        border: 1px solid var(--color-border-subtle);
        border-radius: 10px;
        background: var(--color-surface);
        color: var(--color-graphite);
        font-family: 'Montserrat', sans-serif;
        font-size: 14px;
        transition: var(--tran-fast);
    }
    
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
        outline: none;
        border-color: var(--color-purple);
        box-shadow: 0 0 0 3px rgba(115, 83, 246, 0.1);
    }
    
    .form-group textarea {
        resize: vertical;
        min-height: 100px;
        font-family: 'Montserrat', sans-serif;
    }
    
    .form-actions {
        display: flex;
        gap: 12px;
        margin-top: 40px;
        padding-top: 20px;
        border-top: 1px solid var(--color-border-subtle);
    }
    
    .btn-submit {
        background: var(--gradient-primary);
        color: white;
        padding: 14px 32px;
        border: none;
        border-radius: 10px;
        font-family: 'Montserrat', sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: var(--tran-fast);
        box-shadow: var(--shadow-soft);
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }
    
    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-hover);
    }
    
    .btn-cancel {
        background: transparent;
        color: var(--color-graphite);
        padding: 14px 32px;
        border: 1px solid var(--color-border-subtle);
        border-radius: 10px;
        font-family: 'Montserrat', sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: var(--tran-fast);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }
    
    .btn-cancel:hover {
        background: rgba(115, 83, 246, 0.05);
        border-color: var(--color-purple);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
        .form-header {
            padding: 20px;
        }
        
        .form-header h1 {
            font-size: 24px;
        }
        
        .create-job form {
            padding: 20px;
        }
        
        .form-grid {
            grid-template-columns: 1fr;
        }
        
        .form-actions {
            flex-direction: column;
        }
        
        .btn-submit,
        .btn-cancel {
            width: 100%;
            justify-content: center;
        }
    }
</style>

<div class="edit-job-wrapper">
    <div class="form-header">
        <i class="uil uil-edit icon"></i>
        <h1>Edit Job Posting</h1>
    </div>
    
    <div class="create-job">
        <div class="form-group">
            <label for="job-title">Job Title</label>
            <input type="text" id="job-title" name="title" value="{{ job.title }}" placeholder="Enter job title" required>
        </div>
        <div class="form-group">
            <label for="job-description">Job Description</label>
            <textarea id="job-description" name="description" placeholder="Enter job description" required>{{ job.description }}</textarea>
        </div>
        <div class="form-group">
            <label for="job-location">Location</label>
            <input type="text" id="job-location" name="location" value="{{ job.location }}" placeholder="Enter job location" required>
        </div>
        <div class="form-group">
            <label for="job-salary">Salary</label>
            <input type="number" id="job-salary" name="salary" value="{{ job.salary }}" placeholder="Enter job salary" required>
        </div>
        <button type="submit">Update Job</button>
    </form>
</div>
{% endblock %}
